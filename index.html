<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSY Food 재고수불부 자동생성기</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
:root { --main: #00338D; --gold: #C5A44E; --bg: #f5f6fa; --card: #fff; --border: #dde1e8; --text: #222; --sub: #666; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Malgun Gothic','Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:13px; }
.header { background:var(--main); color:#fff; padding:14px 24px; display:flex; align-items:center; gap:16px; }
.header h1 { font-size:18px; font-weight:700; }
.header .sub { color:var(--gold); font-size:12px; }
.tabs { display:flex; background:#fff; border-bottom:2px solid var(--main); padding:0 16px; }
.tab { padding:10px 20px; cursor:pointer; font-weight:600; color:var(--sub); border-bottom:3px solid transparent; transition:.2s; }
.tab:hover { color:var(--main); }
.tab.active { color:var(--main); border-bottom-color:var(--gold); }
.panel { display:none; padding:20px; max-width:1400px; margin:0 auto; }
.panel.active { display:block; }
.card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:16px; margin-bottom:16px; }
.card h3 { font-size:14px; color:var(--main); margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:6px; }
.btn { padding:8px 18px; border:none; border-radius:4px; cursor:pointer; font-size:13px; font-weight:600; transition:.2s; }
.btn-primary { background:var(--main); color:#fff; }
.btn-primary:hover { background:#002266; }
.btn-gold { background:var(--gold); color:#fff; }
.btn-gold:hover { background:#b09540; }
.btn-sm { padding:5px 12px; font-size:12px; }
.btn-outline { background:transparent; border:1px solid var(--main); color:var(--main); }
.toolbar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
select, input[type=file] { padding:6px 10px; border:1px solid var(--border); border-radius:4px; font-size:13px; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { background:var(--main); color:#fff; padding:6px 8px; text-align:center; font-weight:600; white-space:nowrap; }
td { padding:5px 6px; border:1px solid var(--border); text-align:right; }
td.label { text-align:left; font-weight:600; background:#f8f9fb; white-space:nowrap; }
td input { width:100%; border:1px solid #ddd; padding:3px 5px; text-align:right; font-size:12px; border-radius:2px; }
td input:focus { outline:none; border-color:var(--gold); }
tr.section-header td { background:var(--main); color:#fff; font-weight:700; text-align:center; }
tr.subtotal td { background:#eef2f9; font-weight:700; }
.num { font-variant-numeric:tabular-nums; }
.neg { color:#c00; }
.result-table { overflow-x:auto; }
.msg { padding:12px; border-radius:4px; margin-bottom:12px; }
.msg-info { background:#e8f0fe; color:var(--main); }
.msg-warn { background:#fff3cd; color:#856404; }
.msg-ok { background:#d4edda; color:#155724; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:900px) { .grid-2 { grid-template-columns:1fr; } }
.help { font-size:11px; color:var(--sub); margin-top:4px; }
</style>
</head>
<body>

<div class="header">
  <h1>JSY Food 재고수불부 자동생성기</h1>
  <span class="sub">원육 · 가공육 · 소스 | 총평균법 + BOM 비례배분</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="settings">설정</div>
  <div class="tab" data-tab="rawmeat">원육</div>
  <div class="tab" data-tab="processed">가공육</div>
  <div class="tab" data-tab="sauce">소스</div>
</div>

<!-- ===================== 설정 탭 ===================== -->
<div class="panel active" id="panel-settings">
  <div class="card">
    <h3>작업 기간</h3>
    <div class="toolbar">
      <label>시작년월: <select id="startMonth"></select></label>
      <label>종료년월: <select id="endMonth"></select></label>
    </div>
    <p class="help">26년 기준: 2601(1월)~2612(12월). 기초재고는 시작월 직전 기말 데이터입니다.</p>
  </div>

  <div class="card">
    <h3>기초재고 입력 (시작월 직전 기말)</h3>
    <div class="toolbar">
      <button class="btn btn-outline btn-sm" onclick="importInitialInventory()">25년 수불부에서 불러오기</button>
      <input type="file" id="fileInitInv" accept=".xlsx,.xls" style="display:none">
      <button class="btn btn-outline btn-sm" onclick="clearInitialInventory()">초기화</button>
    </div>
    <div class="grid-2">
      <div>
        <h4 style="font-size:13px;margin:8px 0">원육 기초재고</h4>
        <div id="initRawTable"></div>
      </div>
      <div>
        <h4 style="font-size:13px;margin:8px 0">가공육 기초재고</h4>
        <div id="initProcTable"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===================== 원육 탭 ===================== -->
<div class="panel" id="panel-rawmeat">
  <div class="card">
    <h3>데이터 입력</h3>
    <div class="toolbar">
      <label>매입자료: <input type="file" id="filePurchase" accept=".xlsx,.xls"></label>
      <label>작업일지(참프레시): <input type="file" id="fileWL_CP" accept=".xlsx,.xls"></label>
      <label>작업일지(영미트): <input type="file" id="fileWL_YM" accept=".xlsx,.xls"></label>
      <label>작업일지(인천): <input type="file" id="fileWL_IC" accept=".xlsx,.xls"></label>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="parseRawMeatInputs()">파일 파싱</button>
      <button class="btn btn-outline btn-sm" onclick="showManualRawInput()">수동 입력 모드</button>
    </div>
    <div id="rawParseStatus"></div>
  </div>

  <div class="card" id="rawManualInput" style="display:none">
    <h3>월별 수동 입력</h3>
    <div class="toolbar">
      <label>월 선택: <select id="rawManualMonth"></select></label>
    </div>
    <div id="rawManualTables"></div>
  </div>

  <div class="card">
    <h3>계산 및 결과</h3>
    <div class="toolbar">
      <button class="btn btn-gold" onclick="calculateRawMeat()">원육 수불부 계산</button>
      <button class="btn btn-primary" onclick="exportRawMeatExcel()">엑셀 다운로드</button>
      <label>월 보기: <select id="rawResultMonth" onchange="renderRawResult()"></select></label>
    </div>
    <div id="rawResult" class="result-table"></div>
  </div>
</div>

<!-- ===================== 가공육 탭 ===================== -->
<div class="panel" id="panel-processed">
  <div class="card">
    <h3>가공육 수불부</h3>
    <div class="toolbar">
      <button class="btn btn-gold" onclick="calculateProcessed()">가공육 계산 (원육 결과 필요)</button>
      <button class="btn btn-primary" onclick="exportProcessedExcel()">엑셀 다운로드</button>
      <label>월 보기: <select id="procResultMonth" onchange="renderProcResult()"></select></label>
    </div>
    <div id="procResult" class="result-table"></div>
  </div>
</div>

<!-- ===================== 소스 탭 ===================== -->
<div class="panel" id="panel-sauce">
  <div class="card">
    <h3>데이터 입력</h3>
    <div class="toolbar">
      <label>작업일지(소스): <input type="file" id="fileWL_Sauce" accept=".xlsx,.xls"></label>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="parseSauceInputs()">파일 파싱</button>
      <button class="btn btn-outline btn-sm" onclick="showManualSauceInput()">수동 입력 모드</button>
    </div>
    <div id="sauceParseStatus"></div>
  </div>

  <div class="card" id="sauceManualInput" style="display:none">
    <h3>월별 수동 입력</h3>
    <div class="toolbar">
      <label>월 선택: <select id="sauceManualMonth" onchange="renderSauceManualTables()"></select></label>
    </div>
    <div id="sauceManualTables"></div>
  </div>

  <div class="card">
    <h3>계산 및 결과</h3>
    <div class="toolbar">
      <button class="btn btn-gold" onclick="calculateSauce()">소스 계산</button>
      <button class="btn btn-primary" onclick="exportSauceExcel()">엑셀 다운로드</button>
      <label>월 보기: <select id="sauceResultMonth" onchange="renderSauceResult()"></select></label>
    </div>
    <div id="sauceResult" class="result-table"></div>
  </div>
</div>

function fmt(n) {
  if(n==null||isNaN(n)) return '';
  return Math.round(n).toLocaleString('ko-KR');
}
function fmtDec(n, d=2) {
  if(n==null||isNaN(n)) return '';
  return n.toLocaleString('ko-KR',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function safe(v) { return (v && !isNaN(v)) ? Number(v) : 0; }

function getMonths() {
  const s = parseInt(STATE.startMonth), e = parseInt(STATE.endMonth);
  const months = [];
  for(let m=s; m<=e; m++) {
    const mm = m % 100;
    if(mm >= 1 && mm <= 12) months.push(String(m));
  }
  return months;
}

function monthLabel(code) {
  const y = code.substring(0,2), m = parseInt(code.substring(2));
  return `${y}년 ${m}월`;
}

function prevMonth(code) {
  let y = parseInt(code.substring(0,2)), m = parseInt(code.substring(2));
  m--; if(m<1){m=12;y--;}
  return String(y).padStart(2,'0')+String(m).padStart(2,'0');
}

// ================================================================
//  총평균법 계산 핵심 함수
// ================================================================
function weightedAvg(begQty, begAmt, incQty, incAmt) {
  const totalQty = begQty + incQty;
  const totalAmt = begAmt + incAmt;
  if(totalQty === 0) return { avgPrice:0, totalQty:0, totalAmt:0 };
  return { avgPrice: totalAmt / totalQty, totalQty, totalAmt };
}

function calcInventoryItem(beg, incQty, incPrice, incAmt, outQty) {
  // 입고금액: 직접 지정되면 사용, 아니면 수량×단가
  const iAmt = incAmt != null ? incAmt : (incQty * incPrice);
  const iPrice = incQty > 0 ? iAmt / incQty : 0;

  const avg = weightedAvg(beg.qty, beg.amount, incQty, iAmt);
  const outAmt = outQty * avg.avgPrice;
  const endQty = beg.qty + incQty - outQty;
  const endAmt = avg.totalAmt - outAmt;
  const endPrice = endQty > 0 ? endAmt / endQty : 0;

  return {
    beg: { qty: beg.qty, price: beg.price || (beg.qty>0 ? beg.amount/beg.qty : 0), amount: beg.amount },
    inc: { qty: incQty, price: iPrice, amount: iAmt },
    out: { qty: outQty, price: avg.avgPrice, amount: outAmt },
    end: { qty: endQty, price: endPrice, amount: endAmt },
    avgPrice: avg.avgPrice
  };
}

function calculateRawMeat() {
  const months = getMonths();
  STATE.rawResult = {};

  months.forEach((month, mi) => {
    const result = {};
    const pm = mi === 0 ? null : months[mi-1];

    // 컨테이너: 입고 = 매입합계, 기초/기말 = 0
    result['컨테이너'] = {};
    RAW_ITEMS.forEach(item => {
      const purch = (STATE.purchase[month]||{})[item] || {qty:0, amount:0};
      const price = purch.qty > 0 ? purch.amount / purch.qty : 0;
      result['컨테이너'][item] = {
        beg:{qty:0,price:0,amount:0},
        inc:{qty:purch.qty, price:price, amount:purch.amount},
        out:{qty:purch.qty, price:price, amount:purch.amount},
        end:{qty:0,price:0,amount:0},
        avgPrice: price
      };
    });

    // 각 업체
    COMPANIES_RAW.forEach(co => {
      result[co] = {};
      RAW_ITEMS.forEach(item => {
        // 기초: 전월 기말 or 설정값
        let beg;
        if(pm && STATE.rawResult[pm] && STATE.rawResult[pm][co]) {
          const prev = STATE.rawResult[pm][co][item];
          beg = prev ? {...prev.end} : {qty:0,price:0,amount:0};
        } else {
          beg = STATE.initRaw[co] && STATE.initRaw[co][item]
            ? {...STATE.initRaw[co][item]} : {qty:0,price:0,amount:0};
        }

        // 입고: 작업일지 입고수량 × 컨테이너 입고단가
        const wl = ((STATE.worklog[co]||{})[month]||{})[item] || {incoming:0, outgoing:0};
        const contPrice = result['컨테이너'][item].inc.price;
        const incQty = wl.incoming;
        const incAmt = incQty * contPrice;

        // 출고: 작업일지 출고수량
        const outQty = wl.outgoing;

        result[co][item] = calcInventoryItem(beg, incQty, contPrice, incAmt, outQty);
      });
    });

    // 전사 합산
    result['전사'] = {};
    RAW_ITEMS.forEach(item => {
      let bQ=0,bA=0,iQ=0,iA=0,oQ=0,oA=0;
      COMPANIES_RAW.forEach(co => {
        const d = result[co][item];
        bQ+=d.beg.qty; bA+=d.beg.amount;
        iQ+=d.inc.qty; iA+=d.inc.amount;
        oQ+=d.out.qty; oA+=d.out.amount;
      });
      const eQ = bQ+iQ-oQ;
      const eA = (bA+iA)-oA;
      result['전사'][item] = {
        beg:{qty:bQ, price:bQ>0?bA/bQ:0, amount:bA},
        inc:{qty:iQ, price:iQ>0?iA/iQ:0, amount:iA},
        out:{qty:oQ, price:oQ>0?oA/oQ:0, amount:oA},
        end:{qty:eQ, price:eQ>0?eA/eQ:0, amount:eA},
        avgPrice:(bQ+iQ)>0?(bA+iA)/(bQ+iQ):0
      };
    });

    STATE.rawResult[month] = result;
  });

  document.getElementById('rawParseStatus').innerHTML = '<div class="msg msg-ok">원육 수불부 계산 완료!</div>';
  renderRawResult();
}

// ================================================================
//  가공육 수불부 계산 엔진
// ================================================================
function calculateProcessed() {
  if(!Object.keys(STATE.rawResult).length) {
    alert('원육 수불부를 먼저 계산해주세요.');
    return;
  }
  const months = getMonths();
  STATE.procResult = {};

  months.forEach((month, mi) => {
    const result = {};
    const pm = mi === 0 ? null : months[mi-1];
    const rawMonth = STATE.rawResult[month];
    if(!rawMonth) return;

    COMPANIES_PROC.forEach(co => {
      result[co] = {};
      const rawCo = rawMonth[co];
      if(!rawCo) { PROC_ITEMS.forEach(item => { result[co][item] = emptyRow(); }); return; }

      // Step 1: 각 원육별 출고금액 수집
      const rawOutAmounts = {};
      RAW_ITEMS.forEach(rItem => {
        rawOutAmounts[rItem] = rawCo[rItem] ? rawCo[rItem].out.amount : 0;
      });

      // Step 2: 생산수량 수집
      const prodQty = {};
      PROC_ITEMS.forEach(item => {
        const wl = ((STATE.procWorklog[co]||{})[month]||{})[item];
        prodQty[item] = wl ? wl.production : 0;
      });

      // Step 3: 원육별 표준무게합계 계산
      const rawTotalStdWt = {};
      RAW_ITEMS.forEach(r => { rawTotalStdWt[r] = 0; });

      PROC_ITEMS.forEach(item => {
        const bom = PROC_BOM[item];
        if(!bom || prodQty[item] <= 0) return;
        bom.forEach(b => {
          rawTotalStdWt[b.raw] = (rawTotalStdWt[b.raw]||0) + prodQty[item] * b.wt;
        });
      });

      // Step 4: BOM 비례배분 → 투입원가
      PROC_ITEMS.forEach(item => {
        const bom = PROC_BOM[item];
        let beg;
        if(pm && STATE.procResult[pm] && STATE.procResult[pm][co]) {
          const prev = STATE.procResult[pm][co][item];
          beg = prev ? {...prev.end} : {qty:0,price:0,amount:0};
        } else {
          beg = (STATE.initProc[co]||{})[item] || {qty:0,price:0,amount:0};
          beg = {...beg};
        }

        const pQty = prodQty[item];
        let incAmt = 0;

        if(bom && pQty > 0) {
          bom.forEach(b => {
            const stdWt = pQty * b.wt;
            const totalWt = rawTotalStdWt[b.raw] || 0;
            if(totalWt > 0 && rawOutAmounts[b.raw] > 0) {
              const ratio = stdWt / totalWt;
              incAmt += ratio * rawOutAmounts[b.raw];
            }
          });
        }

        const wl = ((STATE.procWorklog[co]||{})[month]||{})[item];
        const outQty = wl ? wl.outgoing : 0;

        result[co][item] = calcInventoryItem(beg, pQty, 0, incAmt, outQty);
      });
    });

    // 본푸드: 입고 = 다른 업체의 본푸드 출고행, 단가 = 출고업체 총평균단가
    result['본푸드'] = {};
    PROC_ITEMS.forEach(item => {
      let beg;
      if(pm && STATE.procResult[pm] && STATE.procResult[pm]['본푸드']) {
        const prev = STATE.procResult[pm]['본푸드'][item];
        beg = prev ? {...prev.end} : {qty:0,price:0,amount:0};
      } else {
        beg = (STATE.initProc['본푸드']||{})[item] || {qty:0,price:0,amount:0};
        beg = {...beg};
      }

      let incQty = 0, incAmt = 0;
      COMPANIES_PROC.forEach(co => {
        const transfer = ((STATE.bonpoodTransfer[co]||{})[month]||{})[item] || 0;
        if(transfer && result[co] && result[co][item]) {
          incQty += transfer;
          incAmt += transfer * result[co][item].avgPrice;
        }
      });

      const outQty = incQty;
      result['본푸드'][item] = calcInventoryItem(beg, incQty, 0, incAmt, outQty);
    });

    // 샤인스카이(원육): 입고 = 다른 업체의 '샤인' 출고행, 단가 = 출고업체 총평균단가
    result['샤인스카이'] = {};
    SHINE_ITEMS.forEach(item => {
      let beg;
      if(pm && STATE.procResult[pm] && STATE.procResult[pm]['샤인스카이']) {
        const prev = STATE.procResult[pm]['샤인스카이'][item];
        beg = prev ? {...prev.end} : {qty:0,price:0,amount:0};
      } else {
        beg = (STATE.initProc['샤인스카이']||{})[item] || {qty:0,price:0,amount:0};
        beg = {...beg};
      }
      let incQty = 0, incAmt = 0;
      COMPANIES_PROC.forEach(co => {
        const transfer = ((STATE.shineTransfer[co]||{})[month]||{})[item] || 0;
        if(transfer && result[co] && result[co][item]) {
          incQty += transfer;
          incAmt += transfer * result[co][item].avgPrice;
        }
      });
      const outQty = incQty; // pass-through (선물세트 조립 데이터 확보 시 BOM 기반으로 전환)
      result['샤인스카이'][item] = calcInventoryItem(beg, incQty, 0, incAmt, outQty);
    });

    // 샤인스카이(선물세트): 선물세트 조립/출하
    result['샤인선물세트'] = {};
    GIFT_SET_ITEMS.forEach(item => {
      let beg;
      if(pm && STATE.procResult[pm] && STATE.procResult[pm]['샤인선물세트']) {
        const prev = STATE.procResult[pm]['샤인선물세트'][item];
        beg = prev ? {...prev.end} : {qty:0,price:0,amount:0};
      } else { beg = {qty:0,price:0,amount:0}; }
      result['샤인선물세트'][item] = calcInventoryItem(beg, 0, 0, 0, 0);
    });

    // 기타(선물세트)
    result['기타선물세트'] = {};
    GIFT_SET_ITEMS.forEach(item => {
      let beg;
      if(pm && STATE.procResult[pm] && STATE.procResult[pm]['기타선물세트']) {
        const prev = STATE.procResult[pm]['기타선물세트'][item];
        beg = prev ? {...prev.end} : {qty:0,price:0,amount:0};
      } else { beg = {qty:0,price:0,amount:0}; }
      result['기타선물세트'][item] = calcInventoryItem(beg, 0, 0, 0, 0);
    });

    // 전사 합산 (생산업체 + 본푸드 + 샤인스카이)
    const ALL_PROC = [...COMPANIES_PROC, '본푸드', '샤인스카이'];
    result['전사'] = {};
    PROC_ITEMS.forEach(item => {
      let bQ=0,bA=0,iQ=0,iA=0,oQ=0,oA=0;
      ALL_PROC.forEach(co => {
        const d = (result[co]||{})[item];
        if(!d) return;
        bQ+=d.beg.qty; bA+=d.beg.amount;
        iQ+=d.inc.qty; iA+=d.inc.amount;
        oQ+=d.out.qty; oA+=d.out.amount;
      });
      const eQ=bQ+iQ-oQ, eA=(bA+iA)-oA;
      result['전사'][item] = {
        beg:{qty:bQ,price:bQ>0?bA/bQ:0,amount:bA},
        inc:{qty:iQ,price:iQ>0?iA/iQ:0,amount:iA},
        out:{qty:oQ,price:oQ>0?oA/oQ:0,amount:oA},
        end:{qty:eQ,price:eQ>0?eA/eQ:0,amount:eA},
        avgPrice:(bQ+iQ)>0?(bA+iA)/(bQ+iQ):0
      };
    });

    STATE.procResult[month] = result;
  });

  document.getElementById('procResult').innerHTML = '<div class="msg msg-ok">가공육 수불부 계산 완료!</div>';
  renderProcResult();
}

function emptyRow() {
  return {
    beg:{qty:0,price:0,amount:0}, inc:{qty:0,price:0,amount:0},
    out:{qty:0,price:0,amount:0}, end:{qty:0,price:0,amount:0}, avgPrice:0
  };
}

function calculateSauce() {
  const months = getMonths();
  STATE.sauceResult = {};

  months.forEach((month, mi) => {
    const result = { raw:{}, product:{} };
    const pm = mi===0 ? null : months[mi-1];

    // 원재료 총평균법
    SAUCE_RAW.forEach(item => {
      let beg;
      if(pm && STATE.sauceResult[pm]) {
        const prev = STATE.sauceResult[pm].raw[item];
        beg = prev ? {...prev.end} : {qty:0,price:0,amount:0};
      } else {
        beg = (STATE.initSauceRaw||{})[item] || {qty:0,price:0,amount:0};
        beg = {...beg};
      }
      const sr = ((STATE.sauceInput||{})[month]||{})[item] || {incQty:0,incAmt:0,outQty:0};
      result.raw[item] = calcInventoryItem(beg, sr.incQty, 0, sr.incAmt, sr.outQty);
    });

    // BOM 비례배분
    const prodQty = {};
    SAUCE_PRODUCTS.forEach(p => {
      prodQty[p] = ((STATE.sauceProdInput||{})[month]||{})[p] || 0;
    });

    const matTotalStdWt = {};
    SAUCE_RAW.forEach(m => { matTotalStdWt[m] = 0; });
    SAUCE_PRODUCTS.forEach(p => {
      if(prodQty[p] <= 0) return;
      SAUCE_BOM[p].forEach(b => {
        matTotalStdWt[b.mat] += prodQty[p] * b.wt;
      });
    });

    // 인천공장 제품
    result.product['인천공장'] = {};
    SAUCE_PRODUCTS.forEach(prod => {
      let beg;
      if(pm && STATE.sauceResult[pm]) {
        const prev = (STATE.sauceResult[pm].product['인천공장']||{})[prod];
        beg = prev ? {...prev.end} : {qty:0,price:0,amount:0};
      } else {
        beg = ((STATE.initSauceProd||{})['인천공장']||{})[prod] || {qty:0,price:0,amount:0};
        beg = {...beg};
      }

      let incAmt = 0;
      if(prodQty[prod] > 0) {
        SAUCE_BOM[prod].forEach(b => {
          const stdWt = prodQty[prod] * b.wt;
          const totalWt = matTotalStdWt[b.mat] || 0;
          if(totalWt > 0) {
            const outAmt = result.raw[b.mat] ? result.raw[b.mat].out.amount : 0;
            incAmt += (stdWt / totalWt) * outAmt;
          }
        });
      }

      const outQty = ((STATE.sauceProdOutput||{})[month]||{})['인천공장_'+prod] || 0;
      result.product['인천공장'][prod] = calcInventoryItem(beg, prodQty[prod], 0, incAmt, outQty);
    });

    // 참프레시/영미트 제품: 입고 = 인천공장에서 이전받은 수량 × 인천 총평균단가
    ['참프레시','영미트'].forEach(co => {
      result.product[co] = {};
      SAUCE_PRODUCTS.forEach(prod => {
        let beg;
        if(pm && STATE.sauceResult[pm]) {
          const prev = (STATE.sauceResult[pm].product[co]||{})[prod];
          beg = prev ? {...prev.end} : {qty:0,price:0,amount:0};
        } else {
          beg = ((STATE.initSauceProd||{})[co]||{})[prod] || {qty:0,price:0,amount:0};
          beg = {...beg};
        }
        const incQty = ((STATE.sauceProdOutput||{})[month]||{})[co+'_'+prod] || 0;
        const icPrice = (result.product['인천공장'][prod]||{}).avgPrice || 0;
        const incAmt = incQty * icPrice;
        const outQty = incQty; // pass-through (매장 출고 데이터 확보 시 전환)
        result.product[co][prod] = calcInventoryItem(beg, incQty, 0, incAmt, outQty);
      });
    });

    STATE.sauceResult[month] = result;
  });

  document.getElementById('sauceResult').innerHTML = '<div class="msg msg-ok">소스 수불부 계산 완료!</div>';
  renderSauceResult();
}

function updPurchase(month, item, field, val) {
  if(!STATE.purchase[month]) STATE.purchase[month] = {};
  if(!STATE.purchase[month][item]) STATE.purchase[month][item] = {qty:0,amount:0};
  STATE.purchase[month][item][field] = safe(val);
}

function updWorklog(co, month, item, field, val) {
  if(!STATE.worklog[co]) STATE.worklog[co] = {};
  if(!STATE.worklog[co][month]) STATE.worklog[co][month] = {};
  if(!STATE.worklog[co][month][item]) STATE.worklog[co][month][item] = {incoming:0,outgoing:0};
  STATE.worklog[co][month][item][field] = safe(val);
}

const XS = {
  border: { top:{style:'thin',color:{rgb:'888888'}}, bottom:{style:'thin',color:{rgb:'888888'}},
            left:{style:'thin',color:{rgb:'888888'}}, right:{style:'thin',color:{rgb:'888888'}} },
  secHead: { font:{name:'맑은 고딕',sz:11,bold:true,color:{rgb:'FFFFFF'}},
    fill:{fgColor:{rgb:'00338D'}}, alignment:{horizontal:'center',vertical:'center'} },
  colHead: { font:{name:'맑은 고딕',sz:10,bold:true,color:{rgb:'FFFFFF'}},
    fill:{fgColor:{rgb:'00338D'}}, alignment:{horizontal:'center',vertical:'center'} },
  sumHead: { font:{name:'맑은 고딕',sz:10,bold:true}, fill:{fgColor:{rgb:'E8EBF0'}},
    alignment:{horizontal:'center',vertical:'center'} },
  item: { font:{name:'맑은 고딕',sz:10,bold:true}, alignment:{horizontal:'left',vertical:'center'} },
  unit: { font:{name:'맑은 고딕',sz:10}, alignment:{horizontal:'center',vertical:'center'} },
  qty: { font:{name:'맑은 고딕',sz:10}, alignment:{horizontal:'right'}, numFmt:'#,##0.00' },
  price: { font:{name:'맑은 고딕',sz:10}, alignment:{horizontal:'right'}, numFmt:'#,##0' },
  amt: { font:{name:'맑은 고딕',sz:10}, alignment:{horizontal:'right'}, numFmt:'#,##0' },
  sumQty: { font:{name:'맑은 고딕',sz:10,bold:true}, fill:{fgColor:{rgb:'E8EBF0'}},
    alignment:{horizontal:'right'}, numFmt:'#,##0.00' },
  sumAmt: { font:{name:'맑은 고딕',sz:10,bold:true}, fill:{fgColor:{rgb:'E8EBF0'}},
    alignment:{horizontal:'right'}, numFmt:'#,##0' },
};
function bs(s) { return {...s, border:XS.border}; }

function xC(ws, r, c, v, s) {
  const ref = XLSX.utils.encode_cell({r,c});
  const t = typeof v === 'number' ? 'n' : 's';
  ws[ref] = {v, t, s: bs(s)};
}
function xF(ws, r, c, f, s) {
  const ref = XLSX.utils.encode_cell({r,c});
  ws[ref] = {f, t:'n', s: bs(s)};
}
function xEmpty(ws, r, c, s) {
  const ref = XLSX.utils.encode_cell({r,c});
  ws[ref] = {v:'', t:'s', s: bs(s)};
}
function addMerge(ws, r1, c1, r2, c2) {
  if(!ws['!merges']) ws['!merges'] = [];
  ws['!merges'].push({s:{r:r1,c:c1}, e:{r:r2,c:c2}});
}
function setRange(ws, r, c) {
  const cur = XLSX.utils.decode_range(ws['!ref']||'A1');
  if(r > cur.e.r) cur.e.r = r;
  if(c > cur.e.c) cur.e.c = c;
  ws['!ref'] = XLSX.utils.encode_range(cur);
}

function writeSectionHeader(ws, r, name) {
  xC(ws, r, 0, name, XS.secHead);
  xEmpty(ws, r, 1, XS.secHead);
  addMerge(ws, r, 0, r, 1);
  [['기초',2,4],['입고',5,7],['출고',8,10],['기말',11,13]].forEach(([label,c1,c2]) => {
    xC(ws, r, c1, label, XS.secHead);
    for(let c=c1+1;c<=c2;c++) xEmpty(ws, r, c, XS.secHead);
    addMerge(ws, r, c1, r, c2);
  });
}

function writeColHeader(ws, r) {
  const cols = ['품목','단위','수량','단가','금액','수량','단가','금액','수량','단가','금액','수량','단가','금액'];
  cols.forEach((h,c) => xC(ws, r, c, h, XS.colHead));
}

function writeDataRow(ws, r, item, unitStr, d) {
  const R = r + 1;
  xC(ws, r, 0, item, bs(XS.item));
  xC(ws, r, 1, unitStr, bs(XS.unit));
  xC(ws, r, 2, d.beg.qty, bs(XS.qty));
  xF(ws, r, 3, `IF(C${R}=0,0,E${R}/C${R})`, bs(XS.price));
  xC(ws, r, 4, Math.round(d.beg.amount), bs(XS.amt));
  xC(ws, r, 5, d.inc.qty, bs(XS.qty));
  xF(ws, r, 6, `IF(F${R}=0,0,H${R}/F${R})`, bs(XS.price));
  xC(ws, r, 7, Math.round(d.inc.amount), bs(XS.amt));
  xC(ws, r, 8, d.out.qty, bs(XS.qty));
  xF(ws, r, 9, `IF(C${R}+F${R}=0,0,(E${R}+H${R})/(C${R}+F${R}))`, bs(XS.price));
  xF(ws, r, 10, `I${R}*J${R}`, bs(XS.amt));
  xF(ws, r, 11, `C${R}+F${R}-I${R}`, bs(XS.qty));
  xF(ws, r, 12, `J${R}`, bs(XS.price));
  xF(ws, r, 13, `E${R}+H${R}-K${R}`, bs(XS.amt));
}

function writeSumRow(ws, r, dataRows) {
  xC(ws, r, 0, '합계', bs(XS.sumHead));
  xC(ws, r, 1, '', bs(XS.sumHead));
  const sumCols = [2,4,5,7,8,10,11,13];
  const fmCols = [3,6,9,12];
  const R = r+1;
  sumCols.forEach(c => {
    const col = XLSX.utils.encode_col(c);
    const refs = dataRows.map(dr => col+(dr+1)).join(',');
    const s = (c===2||c===5||c===8||c===11) ? XS.sumQty : XS.sumAmt;
    xF(ws, r, c, `SUM(${refs})`, bs(s));
  });
  xF(ws, r, 3, `IF(C${R}=0,0,E${R}/C${R})`, bs(XS.sumAmt));
  xF(ws, r, 6, `IF(F${R}=0,0,H${R}/F${R})`, bs(XS.sumAmt));
  xF(ws, r, 9, `IF(C${R}+F${R}=0,0,(E${R}+H${R})/(C${R}+F${R}))`, bs(XS.sumAmt));
  xF(ws, r, 12, `IF(L${R}=0,0,N${R}/L${R})`, bs(XS.sumAmt));
}

function writeInvSection(ws, r0, name, items, data, unitFn) {
  writeSectionHeader(ws, r0, name);
  writeColHeader(ws, r0+1);
  let r = r0 + 2;
  const dataRows = [];
  items.forEach(item => {
    const zero = {qty:0, amount:0};
    const d = data?.[item] ?? {beg:zero, inc:zero, out:zero, end:zero};
    writeDataRow(ws, r, item, unitFn ? unitFn(item) : 'kg', d);
    dataRows.push(r);
    r++;
  });
  if(dataRows.length > 0) {
    writeSumRow(ws, r, dataRows);
    r++;
  }
  setRange(ws, r, 13);
  return r + 1;
}

function exportRawMeatExcel() {
  if(!Object.keys(STATE.rawResult).length) { alert('먼저 계산을 실행해주세요.'); return; }
  const wb = XLSX.utils.book_new();

  // 매입원본 시트 추가
  if(STATE.purchaseRawWS) {
    XLSX.utils.book_append_sheet(wb, STATE.purchaseRawWS, '매입원본');
  }

  // SUMIFS 참조용 컬럼 문자
  const cm = STATE.purchaseColMap;
  const hasPurch = !!cm;
  let pQtyCol, pAmtCol, pItemCol, pMonthCol, pDS, pDE;
  if(hasPurch) {
    pQtyCol = XLSX.utils.encode_col(cm.qty);
    pAmtCol = XLSX.utils.encode_col(cm.amount);
    pItemCol = XLSX.utils.encode_col(cm.mappedItem);
    pMonthCol = XLSX.utils.encode_col(cm.mappedMonth);
    pDS = STATE.purchaseHeaderRow + 2;
    pDE = STATE.purchaseDataLen;
  }

  getMonths().forEach(month => {
    const data = STATE.rawResult[month];
    if(!data) return;
    const ws = {}; ws['!ref'] = 'A1';
    let r = 0;
    ['전사','컨테이너',...COMPANIES_RAW].forEach(sec => {
      const secStart = r;
      r = writeInvSection(ws, r, sec, RAW_ITEMS, data[sec], ()=>'kg');

      // 컨테이너: 입고수량/입고금액을 SUMIFS로, 출고수량=입고수량 참조
      if(sec === '컨테이너' && hasPurch) {
        RAW_ITEMS.forEach((item, idx) => {
          const row = secStart + 2 + idx;
          const R = row + 1;
          const sumifArgs = `'매입원본'!$${pMonthCol}$${pDS}:$${pMonthCol}$${pDE},"${month}",'매입원본'!$${pItemCol}$${pDS}:$${pItemCol}$${pDE},"${item}"`;
          xF(ws, row, 5, `SUMIFS('매입원본'!$${pQtyCol}$${pDS}:$${pQtyCol}$${pDE},${sumifArgs})`, bs(XS.qty));
          xF(ws, row, 7, `SUMIFS('매입원본'!$${pAmtCol}$${pDS}:$${pAmtCol}$${pDE},${sumifArgs})`, bs(XS.amt));
          xF(ws, row, 8, `F${R}`, bs(XS.qty));
        });
      }
    });
    ws['!cols'] = [{wch:14},{wch:5},...Array(12).fill({wch:15})];
    XLSX.utils.book_append_sheet(wb, ws, month);
  });
  XLSX.writeFile(wb, `원육수불부_${STATE.startMonth}-${STATE.endMonth}.xlsx`);
}

function parsePurchaseFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws, {header:1});

    // 헤더 행 찾기
    let headerRow = -1;
    for(let i=0; i<Math.min(10,data.length); i++) {
      const row = data[i];
      if(!row) continue;
      const joined = row.join('').toLowerCase();
      if(joined.includes('품목') || joined.includes('입고일') || joined.includes('품명')) {
        headerRow = i; break;
      }
    }
    if(headerRow < 0) headerRow = 0;

    const headers = data[headerRow].map(h => String(h||'').trim());
    const colMap = {};
    headers.forEach((h, ci) => {
      const lh = h.toLowerCase().replace(/\s/g,'');
      if(lh.includes('품목코드') || lh==='코드') colMap.code = ci;
      if(lh.includes('품명') || lh.includes('품목명')) colMap.name = ci;
      if(lh.includes('입고일') || lh.includes('일자')) colMap.date = ci;
      if(lh.includes('입고량') || lh.includes('수량')) colMap.qty = ci;
      if(lh.includes('공급가')) colMap.amount = ci;
      else if(!colMap.amount && lh.includes('금액')) colMap.amount = ci;
    });

    // 헬퍼 컬럼 위치 결정 (원본 끝 + 1, +2)
    const maxCol = Math.max(...Object.values(colMap));
    const helpItemCol = maxCol + 1;
    const helpMonthCol = maxCol + 2;
    const hRef1 = XLSX.utils.encode_cell({r:headerRow, c:helpItemCol});
    const hRef2 = XLSX.utils.encode_cell({r:headerRow, c:helpMonthCol});
    ws[hRef1] = {v:'매핑품목', t:'s'};
    ws[hRef2] = {v:'월코드', t:'s'};

    STATE.purchase = {};
    for(let i=headerRow+1; i<data.length; i++) {
      const row = data[i];
      if(!row || row.length < 3) continue;

      const rawName = String(row[colMap.name] || row[colMap.code] || '').trim();
      const code = String(row[colMap.code] || '').trim();
      if(rawName.includes('총') || rawName.includes('합계') || code.includes('총')) continue;
      const itemName = PURCHASE_ITEM_MAP[rawName] || PURCHASE_ITEM_MAP[code] || null;
      if(!itemName || !RAW_ITEMS.includes(itemName)) continue;

      let dateVal = row[colMap.date];
      let month = '';
      if(typeof dateVal === 'number') {
        if(dateVal > 10000000) {
          const ds = String(Math.floor(dateVal));
          month = ds.substring(2,4) + ds.substring(4,6);
        } else {
          const d = XLSX.SSF.parse_date_code(dateVal);
          month = String(d.y%100).padStart(2,'0') + String(d.m).padStart(2,'0');
        }
      } else if(typeof dateVal === 'string') {
        const m8 = dateVal.match(/^(\d{4})(\d{2})\d{2}/);
        if(m8) { month = String(parseInt(m8[1])%100).padStart(2,'0') + m8[2]; }
        else {
          const m = dateVal.match(/(\d{2,4})[.\-\/](\d{1,2})/);
          if(m) month = String(parseInt(m[1])%100).padStart(2,'0') + String(parseInt(m[2])).padStart(2,'0');
        }
      }
      if(!month) continue;

      // 헬퍼 컬럼 기록
      const r1 = XLSX.utils.encode_cell({r:i, c:helpItemCol});
      const r2 = XLSX.utils.encode_cell({r:i, c:helpMonthCol});
      ws[r1] = {v:itemName, t:'s'};
      ws[r2] = {v:month, t:'s'};

      const qty = safe(row[colMap.qty]);
      const amount = safe(row[colMap.amount]);

      if(!STATE.purchase[month]) STATE.purchase[month] = {};
      if(!STATE.purchase[month][itemName]) STATE.purchase[month][itemName] = {qty:0, amount:0};
      STATE.purchase[month][itemName].qty += qty;
      STATE.purchase[month][itemName].amount += amount;
    }

    // 원본 WS 범위 확장 후 저장
    const rng = XLSX.utils.decode_range(ws['!ref']);
    rng.e.c = Math.max(rng.e.c, helpMonthCol);
    ws['!ref'] = XLSX.utils.encode_range(rng);
    STATE.purchaseRawWS = ws;
    STATE.purchaseColMap = {...colMap, mappedItem:helpItemCol, mappedMonth:helpMonthCol};
    STATE.purchaseHeaderRow = headerRow;
    STATE.purchaseDataLen = data.length;
  };
  reader.readAsArrayBuffer(file);
}

function cleanWorklogName(raw, mapObj) {
  const lines = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if(!lines.length) return '';
  let name = lines[0].replace(/\s+/g,'');
  if(lines.length > 1) {
    const line2 = lines[1].replace(/\s+/g,'');
    const combined = name + line2;
    if(mapObj[combined]) return combined;
  }
  if(mapObj[name]) return name;
  return name;
}

function parseWorklogFile(file, company) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, {type:'array'});
    if(!STATE.worklog[company]) STATE.worklog[company] = {};
    if(!STATE.procWorklog[company]) STATE.procWorklog[company] = {};
    if(!STATE.bonpoodTransfer) STATE.bonpoodTransfer = {};
    if(!STATE.bonpoodTransfer[company]) STATE.bonpoodTransfer[company] = {};
    if(!STATE.shineTransfer[company]) STATE.shineTransfer[company] = {};
    if(!STATE.etcTransfer[company]) STATE.etcTransfer[company] = {};

    wb.SheetNames.forEach(sheetName => {
      const monthMatch = sheetName.match(/^(\d{4})$/);
      if(!monthMatch) return;
      const month = monthMatch[1];
      const mo = parseInt(month.substring(2,4));
      if(mo < 1 || mo > 12) return;

      const ws = wb.Sheets[sheetName];
      const data = XLSX.utils.sheet_to_json(ws, {header:1});
      if(!STATE.worklog[company][month]) STATE.worklog[company][month] = {};
      if(!STATE.procWorklog[company][month]) STATE.procWorklog[company][month] = {};
      if(!STATE.bonpoodTransfer[company][month]) STATE.bonpoodTransfer[company][month] = {};
      if(!STATE.shineTransfer[company][month]) STATE.shineTransfer[company][month] = {};
      if(!STATE.etcTransfer[company][month]) STATE.etcTransfer[company][month] = {};

      let section = null;
      let currentItem = null;
      const ROW_TYPES = ['기초','입고','출고','기말','매장','본푸드','샤인','기타'];

      for(let r=0; r<data.length; r++) {
        const row = data[r];
        if(!row) continue;

        const col1raw = String(row[1]||'');
        const col1clean = col1raw.split('\n')[0].replace(/\s+/g,'').trim();

        if(col1clean.match(/^[0-9]+\.?원육$/) || col1clean === '원육') {
          section = 'raw'; currentItem = null; continue;
        }
        if(col1clean.match(/^[0-9]+\.?가공육$/) || col1clean === '가공육') {
          section = 'proc'; currentItem = null; continue;
        }
        if(col1clean.match(/^[0-9]+\.?작업비/) || col1clean === '작업비') {
          section = null; currentItem = null; continue;
        }
        if(!section || row.length < 4) continue;

        const col3 = String(row[3]||'').trim();
        if(col1clean.includes('소계') || col1clean.includes('합계') || col1clean === '품목') continue;

        if(col1clean && !ROW_TYPES.includes(col1clean)) {
          if(section === 'raw') {
            currentItem = cleanWorklogName(col1raw, WORKLOG_RAW_MAP);
          } else {
            currentItem = cleanWorklogName(col1raw, WORKLOG_PROC_MAP);
            if(currentItem === '돼지갈비') {
              const unit = String(row[2]||'').replace(/\s/g,'');
              if(unit.includes('팩') || unit.toLowerCase().includes('pack'))
                currentItem = '돼지갈비(동그랑땡)';
            }
          }
        }
        if(!currentItem || !ROW_TYPES.includes(col3)) continue;

        const total = safe(row[4]);

        if(section === 'raw') {
          const itemName = WORKLOG_RAW_MAP[currentItem];
          if(!itemName) continue;
          if(!STATE.worklog[company][month][itemName])
            STATE.worklog[company][month][itemName] = {incoming:0, outgoing:0};
          if(col3 === '입고') STATE.worklog[company][month][itemName].incoming = total;
          if(col3 === '출고') STATE.worklog[company][month][itemName].outgoing = total;
        } else {
          const itemName = WORKLOG_PROC_MAP[currentItem];
          if(!itemName) continue;
          if(!STATE.procWorklog[company][month][itemName])
            STATE.procWorklog[company][month][itemName] = {production:0, outgoing:0};
          if(col3 === '입고') STATE.procWorklog[company][month][itemName].production = total;
          if(col3 === '출고') STATE.procWorklog[company][month][itemName].outgoing = total;
          if(col3 === '본푸드') STATE.bonpoodTransfer[company][month][itemName] = total;
          if(col3 === '샤인') STATE.shineTransfer[company][month][itemName] = total;
          if(col3 === '기타') STATE.etcTransfer[company][month][itemName] = total;
        }
      }

      // 원육→가공육 소분판매 pass-through (안창살/우설: 원육출고 = 가공육 입출고)
      const rawD = STATE.worklog[company][month];
      const procD = STATE.procWorklog[company][month];
      ['안창살','우설'].forEach(item => {
        if(rawD[item] && rawD[item].outgoing && !procD[item]?.production) {
          if(!procD[item]) procD[item] = {production:0, outgoing:0};
          procD[item].production = rawD[item].outgoing;
          procD[item].outgoing = rawD[item].outgoing;
        }
      });
      // 깐양: 막내장+깐양 원육출고 합계 = 가공육 깐양 생산
      if(rawD['막내장']?.outgoing || rawD['깐양']?.outgoing) {
        const prod = (rawD['막내장']?.outgoing||0) + (rawD['깐양']?.outgoing||0);
        if(prod > 0 && !procD['깐양']?.production) {
          if(!procD['깐양']) procD['깐양'] = {production:0, outgoing:0};
          procD['깐양'].production = prod;
          procD['깐양'].outgoing = prod;
        }
      }
    });
  };
  reader.readAsArrayBuffer(file);
}

// ================================================================
//  소스 작업일지 파서
// ================================================================
const SAUCE_WL_RAW_MAP = {
  '정종(백화수복)':'정종','정종':'정종',
  '황설탕':'황설탕',
  '양조간장(701S)':'양조간장(701S)','양조간장':'양조간장(701S)',
  '후추가루':'후추','후추':'후추',
  '갈아만든배':'갈아만든배','갈아만든 배':'갈아만든배',
  '아침에사과주스':'아침에사과','아침에 사과주스':'아침에사과','아침에사과':'아침에사과',
  '진간장':'진간장',
  '카라멜':'카라멜',
  '포도당':'포도당',
  '프로찜에스':'프로찜에스',
  '미원':'미원',
};
const SAUCE_WL_PROD_MAP = {
  '돼지갈비양념':'돼지갈비양념',
  '마늘갈비양념':'마늘갈비양념',
};

function parseSauceInputs() {
  const statusDiv = document.getElementById('sauceParseStatus');
  statusDiv.innerHTML = '<div class="msg msg-info">파일 파싱 중...</div>';

  const fileWL = document.getElementById('fileWL_Sauce').files[0];
  if(!fileWL) {
    statusDiv.innerHTML = '<div class="msg msg-warn">작업일지(소스) 파일을 선택해주세요.</div>';
    return;
  }
  parseSauceWorklogFile(fileWL, function(monthCount) {
    statusDiv.innerHTML = `<div class="msg msg-ok">소스 작업일지 파싱 완료: ${monthCount}개월</div>`;
  });
}

function parseSauceWorklogFile(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, {type:'array'});
    let monthCount = 0;

    wb.SheetNames.forEach(sheetName => {
      const monthMatch = sheetName.match(/^(\d{4})$/);
      if(!monthMatch) return;
      const month = monthMatch[1];
      const mo = parseInt(month.substring(2,4));
      if(mo < 1 || mo > 12) return;

      const ws = wb.Sheets[sheetName];
      const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      if(!STATE.sauceInput[month]) STATE.sauceInput[month] = {};
      if(!STATE.sauceProdInput[month]) STATE.sauceProdInput[month] = {};
      if(!STATE.sauceProdOutput[month]) STATE.sauceProdOutput[month] = {};

      let section = null; // 'raw' or 'product'
      let currentItem = null;
      const ROW_TYPES = ['기초','입고','출고','기말','매장','본푸드','참프레시','영미트','샤인'];

      for(let r = 0; r < data.length; r++) {
        const row = data[r];
        if(!row) continue;

        const col1 = String(row[1]||'').replace(/\s+/g,' ').trim();
        const col3 = String(row[3]||'').trim();

        if(col1.match(/원재료/) || col1 === '1. 원재료') {
          section = 'raw'; currentItem = null; continue;
        }
        if(col1.match(/제품/) || col1 === '2. 제품') {
          section = 'product'; currentItem = null; continue;
        }
        if(col1 === '품목' || !section) continue;

        if(col1 && !ROW_TYPES.includes(col1)) {
          const cleanName = col1.replace(/\s+/g,'');
          if(section === 'raw') {
            currentItem = SAUCE_WL_RAW_MAP[col1] || SAUCE_WL_RAW_MAP[cleanName] || null;
          } else {
            currentItem = SAUCE_WL_PROD_MAP[col1] || SAUCE_WL_PROD_MAP[cleanName] || null;
          }
        }
        if(!currentItem || !ROW_TYPES.includes(col3)) continue;

        const total = safe(row[4]);

        if(section === 'raw') {
          if(!STATE.sauceInput[month][currentItem])
            STATE.sauceInput[month][currentItem] = {incQty:0, incAmt:0, outQty:0};
          if(col3 === '입고') STATE.sauceInput[month][currentItem].incQty = total;
          if(col3 === '출고') STATE.sauceInput[month][currentItem].outQty = total;
        } else if(section === 'product') {
          if(col3 === '입고') STATE.sauceProdInput[month][currentItem] = total;
          if(col3 === '출고') STATE.sauceProdOutput[month]['인천공장_'+currentItem] = total;
          // 배분처별 출고
          if(['참프레시','영미트'].includes(col3)) {
            STATE.sauceProdOutput[month][col3+'_'+currentItem] = total;
          }
        }
      }
      monthCount++;
    });
    if(callback) callback(monthCount);
  };
  reader.readAsArrayBuffer(file);
}

function showManualSauceInput() {
  const div = document.getElementById('sauceManualInput');
  div.style.display = div.style.display === 'none' ? 'block' : 'none';
  if(div.style.display === 'block') {
    const sel = document.getElementById('sauceManualMonth');
    sel.innerHTML = getMonths().map(m => `<option value="${m}">${m.substring(0,2)}년 ${parseInt(m.substring(2))}월</option>`).join('');
    renderSauceManualTables();
  }
}

function renderSauceManualTables() {
  const month = document.getElementById('sauceManualMonth').value;
  if(!month) return;
  if(!STATE.sauceInput[month]) STATE.sauceInput[month] = {};
  if(!STATE.sauceProdInput[month]) STATE.sauceProdInput[month] = {};
  if(!STATE.sauceProdOutput[month]) STATE.sauceProdOutput[month] = {};

  let html = '<h4>원재료 입출고</h4>';
  html += '<table><tr><th>품목</th><th>입고수량</th><th>입고금액</th><th>출고수량</th></tr>';
  SAUCE_RAW.forEach(item => {
    const d = STATE.sauceInput[month][item] || {incQty:0, incAmt:0, outQty:0};
    html += `<tr><td>${item}</td>`;
    html += `<td><input type="number" value="${d.incQty||''}" onchange="updSauceRaw('${month}','${item}','incQty',this.value)" style="width:80px"></td>`;
    html += `<td><input type="number" value="${d.incAmt||''}" onchange="updSauceRaw('${month}','${item}','incAmt',this.value)" style="width:100px"></td>`;
    html += `<td><input type="number" value="${d.outQty||''}" onchange="updSauceRaw('${month}','${item}','outQty',this.value)" style="width:80px"></td>`;
    html += '</tr>';
  });
  html += '</table>';

  html += '<h4>제품 생산/출고</h4>';
  html += '<table><tr><th>품목</th><th>생산수량(입고)</th><th>출고수량</th></tr>';
  SAUCE_PRODUCTS.forEach(prod => {
    const prodQty = STATE.sauceProdInput[month][prod] || 0;
    const outQty = STATE.sauceProdOutput[month]['인천공장_'+prod] || 0;
    html += `<tr><td>${prod}</td>`;
    html += `<td><input type="number" value="${prodQty||''}" onchange="updSauceProd('${month}','${prod}',this.value)" style="width:80px"></td>`;
    html += `<td><input type="number" value="${outQty||''}" onchange="updSauceProdOut('${month}','${prod}',this.value)" style="width:80px"></td>`;
    html += '</tr>';
  });
  html += '</table>';

  document.getElementById('sauceManualTables').innerHTML = html;
}

function updSauceRaw(month, item, field, val) {
  if(!STATE.sauceInput[month]) STATE.sauceInput[month] = {};
  if(!STATE.sauceInput[month][item]) STATE.sauceInput[month][item] = {incQty:0, incAmt:0, outQty:0};
  STATE.sauceInput[month][item][field] = safe(val);
}
function updSauceProd(month, prod, val) {
  if(!STATE.sauceProdInput[month]) STATE.sauceProdInput[month] = {};
  STATE.sauceProdInput[month][prod] = safe(val);
}
function updSauceProdOut(month, prod, val) {
  if(!STATE.sauceProdOutput[month]) STATE.sauceProdOutput[month] = {};
  STATE.sauceProdOutput[month]['인천공장_'+prod] = safe(val);
}
